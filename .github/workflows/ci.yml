name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          browser: chrome
        env:
          CYPRESS_DEMOQA_USERNAME: ${{ secrets.DEMOQA_USERNAME }}
          CYPRESS_DEMOQA_PASSWORD: ${{ secrets.DEMOQA_PASSWORD }}
